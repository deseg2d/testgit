apiVersion: v1
kind: Service
metadata:
  labels:
    app: {{ .Values.maintenance.service.name }}
  name: {{ .Values.maintenance.service.name }}
spec:
  type: {{ .Values.maintenance.service.type }}
  ports:
    - name: "http"
      port: {{ .Values.maintenance.service.port }}
      targetPort: {{ .Values.maintenance.service.targetPort }}
  selector:
    app: {{ .Values.maintenance.service.name }}
